<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="formulario.css">
</head>
<body>
    <div class="container">
        <h1>Vamos Conversar!!</h1>
        
        <div class="toggle-container">
            <label class="toggle-label">Tipo de Mensagem:</label>
            <label class="toggle-switch">
                <input type="checkbox" id="messageToggle" checked>
                <span class="slider"></span>
            </label>
            <p class="toggle-text" id="toggleText">🌍 Mensagem Pública</p>
        </div>
        
        <form id="meuFormulario">
            <div class="form-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" required placeholder="Digite seu nome">
            </div>

             <div class="form-group titulo-field" id="tituloField">
                <label for="titulo">Título</label>
                <input type="text" id="titulo" name="titulo" required placeholder="dev, recrutador, CEO de bar, etc">
            </div>
            <div class="form-group email-field" id="emailField">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="Digite seu email">
            </div>            

            <div class="form-group">
                <label  for="mensagem">Mensagem</label>
                <textarea id="mensagem" name="mensagem" required placeholder="Digite sua mensagem"></textarea>
            </div>

            <button id="btnEnviar" type="submit" class="submit-btn"><i class="fas fa-paper-plane"></i> Enviar</button>
        </form>
        
        <section class="messages-section">
            <h2><i class="fas fa-comments"></i> Mural</h2>
            <div class="messages-list" id="messagesList">
                <div class="no-messages">
                    <i class="fas fa-inbox fa-2x"></i>
                    <p>Ainda não há mensagens públicas.</p>
                </div>
            </div>
        </section>
        
        <footer>
            <button onclick="window.location.href='../cv/curriculo.html';"><i class="fas fa-arrow-left"></i> Currículo</button>
        </footer>
    </div>
    <button class="theme-toggle" id="themeToggle" title="Alternar tema" aria-label="Alternar tema claro/escuro">
        <i class="fas fa-moon"></i>
    </button>
    <script src="formulario.js"></script>
    <script type="module" src="firebase-config.js"></script>
</body>
</html>
