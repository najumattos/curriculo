<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currículo | Ana Julia Reis de Mattos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #1e293b;
            --accent: #3b82f6;
            --text: #334155;
            --bg: #f8fafc;
            --surface: #ffffff;
            --border: rgba(51, 65, 85, 0.15);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --button-bg: #1e293b;
            --button-text: #ffffff;
            --button-hover: #3b82f6;
        }

        body.dark-mode {
            --primary: #e2e8f0;
            --accent: #60a5fa;
            --text: #cbd5e1;
            --bg: #0f172a;
            --surface: #1e293b;
            --border: rgba(148, 163, 184, 0.18);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.35);
            --button-bg: #2563eb;
            --button-text: #ffffff;
            --button-hover: #60a5fa;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: var(--surface);
            padding: 40px;
            box-shadow: var(--shadow);
            transition: background-color 0.3s, color 0.3s, box-shadow 0.3s;
        }

        body.dark-mode .container {
            color: var(--text);
        }

        header {
            border-bottom: 3px solid var(--accent);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1 { color: var(--primary); margin: 0; font-size: 2.2rem; }
        h2 { color: var(--accent); margin: 0; font-weight: 400; font-size: 1.2rem; }

        .profile-header {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .profile-left {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }

        .profile-top {
            display: flex;
            align-items: flex-start;
            gap: 20px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--accent);
            flex-shrink: 0;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .title-group {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .title-group h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .title-group h2 {
            font-size: 1rem;
            margin-bottom: 0;
        }

        .contact-info-left {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            font-size: 0.85rem;
        }

        .contact-info-left p {
            margin: 0;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }

        .contact-info-right {
            display: flex;
            flex-direction: column;
            gap: 3px;
            font-size: 0.85rem;
        }

        .contact-info-right p {
            margin: 0;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .contact-info span,
        .contact-info a {
            word-break: break-word;
        }

        h3 {
            border-left: 4px solid var(--accent);
            padding-left: 10px;
            color: var(--primary);
            text-transform: uppercase;
            font-size: 1.1rem;
            margin-top: 20px;
            margin-bottom: 10px;
        }

        .grid { display: grid; }
        .two-cols { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }

        .item { margin-bottom: 8px; }
        .formation-card,
        .study-card,
        .experience-card {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            background: var(--surface);
            box-shadow: 0 1px 2px rgba(51, 65, 85, 0.06);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 5px;
        }
        .card-header h4 {
            margin: 0;
            flex: 1;
        }
        .card-header small {
            white-space: nowrap;
            font-size: 0.8rem;
        }
                .chama-formulario {           
            text-decoration: none;           
            transition: transform 0.3s, box-shadow 0.3s;
            color: var(--primary);
        }

        .chama-formulario:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .formation-card p,
        .experience-card p { margin: 2px 0; }
        .study-card p { margin: 0; }
        h4 { margin: 0; color: var(--primary); }

        @media (max-width: 780px) {
            .contact-info,
            .two-cols {
                grid-template-columns: 1fr;
            }
        }

        footer { margin-top: 40px; text-align: center; }

        .nav-button {
            display: inline-block;
            margin-left: 10px;
            background: var(--accent);
        }

        button {
            background: var(--button-bg);
            color: var(--button-text);
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
            margin-right: 10px;
        }

        button:hover { background: var(--button-hover); }

        .theme-toggle {
            background: var(--accent);
            width: 50px;
            height: 50px;
            padding: 0;
            border-radius: 50%;
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.2);
            z-index: 1000;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        @media print {
            .no-print { display: none; }
            body { padding: 0; }
            .container { box-shadow: none; width: 100%; max-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="profile-header">
                <div class="profile-left">
                    <div class="profile-top">
                        <div class="avatar">
                            <img id="foto-perfil" src="" alt="Foto de Ana Julia">
                        </div>
                        <div class="title-group">
                            <h1 id="nome"></h1>
                            <h2 id="titulo"></h2>
                        </div>
                    </div>
                    <div class="contact-info-left">
                        <p><span id="idade"></span></p>
                        <p>|</p>
                        <p><span id="localizacao"></span></p>
                        <p>|</p>
                        <p><span id="estado_civil"></span></p>
                        <p>|</p>
                        <p><i class="fas fa-phone"></i> <a id="telefone" href="#" target="_blank" rel="noopener noreferrer"></a></p>
                    </div>
                </div>
                <div class="contact-info-right">
                    <p><i class="fas fa-envelope"></i> <span id="email"></span></p>
                    <p><i class="fas fa-envelope"></i> <span id="email-secundario"></span></p>
                    <p><i class="fab fa-github"></i> <a id="github" href="#" target="_blank" rel="noopener noreferrer"></a></p>
                    <p><i class="fab fa-linkedin"></i> <a id="linkedin" href="#" target="_blank" rel="noopener noreferrer"></a></p>
                </div>
            </div>
        </header>

        <main>
            <section id="objetivo">
                <h3><i class="fas fa-bullseye"></i> OBJETIVO</h3>
                <p id="objetivo-texto"></p>
            </section>

            <div class="grid">
                <section>
                    <h3><i class="fas fa-briefcase"></i> EXPERIÊNCIA</h3>
                    <div id="experiencia-lista"></div>
                </section>

                <div class="two-cols">
                    <section>
                        <h3><i class="fas fa-graduation-cap"></i> FORMAÇÃO</h3>
                        <div id="formacao-lista"></div>
                    </section>

                    <section>
                        <h3><i class="fas fa-book"></i> ESTUDOS</h3>
                        <div id="estudos-lista"></div>
                    </section>
                </div>
            </div>
        </main>

        <footer class="no-print">
            <button onclick="baixarPDF()"><i class="fas fa-print"></i> Baixar PDF</button>
            <button class="nav-button"> <a class="chama-formulario" href="../form/formulario.html">📋 Mural</a></button>
        </footer>
    </div>
    <button class="theme-toggle no-print" id="themeToggle" title="Alternar tema" aria-label="Alternar tema claro/escuro">
        <i class="fas fa-moon"></i>
    </button>
    <script src="curriculo.js"></script>
</body>
</html>
